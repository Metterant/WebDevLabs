<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GitHub Repo Finder</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #0d1117;
        color: #c9d1d9;
        padding: 20px;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
      }

      .header h1 {
        color: #58a6ff;
        margin-bottom: 10px;
      }

      .search-container {
        background: #161b22;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 30px;
      }

      .search-box {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
      }

      .search-box input {
        flex: 1;
        padding: 12px;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #c9d1d9;
        font-size: 16px;
      }

      .search-box button {
        padding: 12px 30px;
        background: #238636;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      }

      .search-box button:hover {
        background: #2ea043;
      }

      .filters {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .filters label {
        color: #8b949e;
      }

      .filters select {
        padding: 8px 12px;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #c9d1d9;
      }

      .repo-card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 15px;
        transition: transform 0.2s;
      }

      .repo-card:hover {
        transform: translateY(-2px);
        border-color: #58a6ff;
      }

      .repo-name {
        color: #58a6ff;
        font-size: 20px;
        font-weight: bold;
        text-decoration: none;
      }

      .repo-name:hover {
        text-decoration: underline;
      }

      .repo-description {
        color: #8b949e;
        margin: 10px 0;
      }

      .repo-meta {
        display: flex;
        gap: 20px;
        font-size: 14px;
        color: #8b949e;
      }

      .language-badge {
        display: inline-block;
        padding: 4px 10px;
        margin-left: 5px;
        background: #1f6feb;
        border-radius: 12px;
        font-size: 12px;
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: #8b949e;
      }

      .error {
        background: #da3633;
        color: white;
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
      }

      .load-more {
        text-align: center;
        margin: 30px 0;
      }

      .load-more button {
        padding: 12px 40px;
        background: #238636;
        border: 1px solid #30363d;
        color: #c9d1d9;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      }

      .load-more button:hover {
        background: #2ea043;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🔍 GitHub Repository Finder</h1>
        <p style="color: #8b949e">Search and explore GitHub repositories</p>
      </div>

      <div class="search-container">
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Search repositories..."
            onkeypress="if (event.key === 'Enter') performSearch();"
          />
          <button onclick="performSearch()">Search</button>
        </div>

        <div class="filters">
          <label>Sort by:</label>
          <select id="sortSelect" onchange="performSearch()">
            <option value="stars">⭐ Stars</option>
            <option value="forks">🔱 Forks</option>
            <option value="updated">🕒 Recently Updated</option>
          </select>
        </div>
      </div>

      <div id="repoList"></div>
      <div class="loading" id="loadingMessage">Loading...</div>
      <div class="error" id="errorMessage"></div>
      <div id="loadMoreContainer">
        <div class="load-more">
          <button onclick="loadMore()">Load more</button>
        </div>
      </div>
    </div>

    <script>
      let currentPage = 1;
      let currentQuery = "";
      let currentSortOption = "";
      let totalResults = 0;      

      const repoList = document.getElementById("repoList");
      const errorMessage = document.getElementById("errorMessage");
      const loadMoreContainer = document.getElementById("loadMoreContainer");
      const loadingMessage = document.getElementById("loadingMessage");

      // TODO: Implement functions

      async function searchRepositories(query, sort = "stars", page = 1) {
        // TODO: Fetch repositories from GitHub API
        const url = `https://api.github.com/search/repositories?q=${query}&sort=${sort}&page=${page}&per_page=10`;
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(
            "Failed to fetch repositories. You might have hit the GitHub API rate limit.",
          );
        }
        const data = await response.json();
        totalResults = data.total_count;
        return data.items;
      }

      function displayRepositories(repos, append = false) {
        // TODO: Display repository cards
        // If append is true, add to existing results
        // Otherwise, replace all results

        if (!append) clearRepoList();

        if (repos.length === 0) {
          showError("No Repository found!");
          loadMoreContainer.style.display = "none";
          return;
        }

        repos.forEach((repo) => {
          addRepoListCard(createRepoCard(repo));
        });
        hideLoading();

        if (repos.length >= 10 && currentPage * 10 < totalResults)
          showLoadMore();
        else hideLoadMore();
      }

      function createRepoCard(repo) {
        // TODO: Create HTML for a single repository card
        // Include: name, description, stars, forks, language
        // repo.name, repo.description, repo.stargazers_count
        // repo.forks_count, repo.language, repo.html_url, repo.owner.login
        return `
          <div class="repo-card">
            <a class="repo-name" href="${repo.html_url}" target="_blank"">
                ${repo.full_name}
            </a>
            <p class="repo-description">${repo.description ? repo.description : "No description provided."}</p>
            <p style="color: #c9d1d9;">
                ⭐ ${formatNumber(repo.stargazers_count)} 
                🔱 ${formatNumber(repo.forks_count)}
                <span class="language-badge">${repo.language ? repo.language : "N/A"}</span>
            </p>
          </div>`;
      }

      async function performSearch() {
        // TODO: Get search query and sort option
        // TODO: Reset page to 1
        // TODO: Call searchRepositories
        // TODO: Display results
        currentQuery = document.getElementById("searchInput").value.trim();
        currentSortOption = document.getElementById("sortSelect").value;

        currentPage = 1;
        clearRepoList();
        hideLoadMore();
        showLoading();
        const repos = await searchRepositories(currentQuery, currentSortOption, currentPage);

        displayRepositories(repos, false);
      }

      async function loadMore() {
        // TODO: Increment page
        // TODO: Fetch next page
        // TODO: Append results
        currentPage++;
        hideLoadMore();
        showLoading();
        const repos = await searchRepositories(currentQuery, currentSortOption, currentPage);

        displayRepositories(repos, true);
      }

      function showError(message) {
        // TODO: Display error message
        errorMessage.textContent = message;
        errorMessage.style.display = "block";
      }

      function clearError() {
        // TODO: Clear error message
        errorMessage.textContent = "";
        errorMessage.style.display = "none";
      }

      function showLoadMore() {
        loadMoreContainer.style.display = "block";
      }

      function hideLoadMore() {
        loadMoreContainer.style.display = "none";
      }

      function showLoading() {
        loadingMessage.style.display = "block";
      }

      function hideLoading() {
        loadingMessage.style.display = "none";
      }

      function addRepoListCard(repoCard) {
        repoList.innerHTML += repoCard;
      }

      function clearRepoList() {
        repoList.innerHTML = "";
      }

      function formatNumber(num) {
        // TODO: Format large numbers (e.g., 1500 -> 1.5k)
        if (num >= 1000) {
          return (num / 1000).toFixed(1) + "k";
        }
        return num;
      }

      // Initialization
      hideLoadMore();
      hideLoading();
      clearError();

    </script>
  </body>
</html>
