<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Validator</title>
    <style>
        .form-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        input.valid {
            border-color: #28a745;
        }
        
        input.invalid {
            border-color: #dc3545;
        }
        
        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        
        button[type="submit"]:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Sign Up Form</h2>
        <form id="signupForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username">
                <div class="error-message" id="usernameError"></div>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="Enter email">
                <div class="error-message" id="emailError"></div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter Password">
                <div class="error-message" id="passwordError"></div>
            </div>
            
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Re-enter Password">
                <div class="error-message" id="confirmPasswordError"></div>
            </div>
            
            <button type="submit" id="submitBtn" disabled>Sign Up</button>
        </form>
    </div>

    <script>
        // TODO: Implement validation functions
        
        function validateUsername(username) {
            // TODO: Check length (4-20) and alphanumeric
            const length = username.length;
            if (length < 4 || length > 20) {
                return {isValid: false, message: "Invalid username: must be 4-20 characters long!"};
            }
            const usernameRegex = /^[a-zA-Z0-9]+$/;

            if (!usernameRegex.test(username)) {
                return {isValid: false, message: "Invalid username: only letters and numbers allowed!"};
            }

            return {isValid: true, message: ""};
        }
        
        function validateEmail(email) {
            // TODO: Use regex for email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailRegex.test(email)) {
                return {isValid: false, message: "Invalid email!"}
            }
            return {isValid: true, message: ""};
        }
        
        function validatePassword(password) {
            // TODO: Check length >= 8, has uppercase, has number
            if (password.length < 8) {
                return {isValid: false, message: "Invalid Password: Must contain more than 8 letter!"};
            }
            if (!/[A-Z]/.test(password)) {
                return {isValid: false, message: "Invalid Password: Must contain at least one uppercase letter!"};
            }
            if (!/[0-9]/.test(password)) {
                return {isValid: false, message: "Invalid Password: Must contain at least one number!"};
            }
            else {
                return {isValid: true, message: ""};
            }
        }
        
        function validatePasswordMatch(pass1, pass2) {
            // TODO: Compare passwords
            if (pass1 != pass2)
                return {isValid: false, message: "Passwords don't match!"};
            return {isValid: true, message: ""};
        }
        
        function showError(fieldId, message) {
            // TODO: Display error message
            const errorElement = document.getElementById(fieldId);
            errorElement.textContent = message;
            errorElement.classList.add("show");
        }
        
        function clearError(fieldId) {
            // TODO: Clear error message
            const errorElement = document.getElementById(fieldId);
            errorElement.textContent = "";
            errorElement.classList.remove("show");
        }
        
        function validateForm() {
            // TODO: Validate all fields and enable/disable submit
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const confirmPassword = document.getElementById("confirm-password").value.trim();

            const usernameCheck = validateUsername(username);
            if (!usernameCheck.isValid) {
                return false;
            }

            const emailCheck = validateEmail(email);
            if (!emailCheck.isValid) {
                return false;
            }

            const passwordCheck = validatePassword(password);
            if (!passwordCheck.isValid) {
                return false;
            }

            const matchCheck = validatePasswordMatch(password, confirmPassword);
            if (!matchCheck.isValid) {
                return false;
            }

            return true;
        }
        
        // TODO: Add event listeners for real-time validation
        document.getElementById("username").addEventListener("input", function() {
            const usernameCheck = validateUsername(this.value.trim());
            if (usernameCheck.isValid)
                clearError("usernameError");
            else showError("usernameError", usernameCheck.message);
        });

        document.getElementById("email").addEventListener("input", function() {
            const emailCheck = validateEmail(this.value.trim());
            if (emailCheck.isValid)
                clearError("emailError");
            else showError("emailError", emailCheck.message);
        });
        
        document.getElementById("password").addEventListener("input", function() {
            const passwordValue = this.value.trim();
            const passwordCheck = validatePassword(passwordValue);

            if (passwordCheck.isValid)
                clearError("passwordError");
            else showError("passwordError", passwordCheck.message);

            const confirmPasswordValue = document.getElementById("confirm-password").value.trim();
            if (confirmPasswordValue.length > 0) {
                const matchCheck = validatePasswordMatch(passwordValue, confirmPasswordValue);
                if (matchCheck.isValid)
                    clearError("confirmPasswordError");
                else showError("confirmPasswordError", matchCheck.message);
            }
        });

        document.getElementById("confirm-password").addEventListener("input", function() {
            const passwordValue = document.getElementById("password").value.trim();
            const matchCheck = validatePasswordMatch(passwordValue, this.value.trim());

            if (matchCheck.isValid)
                clearError("confirmPasswordError");
            else showError("confirmPasswordError", matchCheck.message);
        });

        document.addEventListener("input", function() {
            const submitBtn = document.getElementById("submitBtn");
            if (validateForm())
                submitBtn.disabled = false;
            else submitBtn.disabled = true;
        });
        
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // TODO: Handle form submission
            if (validateForm())
                alert("Form Submitted!");
        });
    </script>
</body>
</html>
