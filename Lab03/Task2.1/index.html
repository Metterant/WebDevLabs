<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Weather Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
      }

      .search-box {
        background: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
      }

      .search-box input {
        width: 70%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 4px;
        font-size: 16px;
      }

      .search-box button {
        width: 28%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        /* margin-left: 2%; */
      }

      .weather-card {
        background: rgb(255, 255, 255);
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        margin-bottom: 20px;
        margin-top: 20px;
        display: flex;
      }

      .weather-card-left {
        text-align: left;
        flex: 6;
      }

      .weather-card-right {
        text-align: right;
        flex: 4;
      }

      .weather-info {
        font-size: 18px;
        margin-bottom: 5px;
        margin-top: 5px;
      }

      .current-weather {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .temp-display {
        font-size: 60px;
        font-weight: bold;
      }

      .forecast-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
        margin-top: 20px;
      }

      .forecast-item {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 8px;
        text-align: center;
        font-size: 20px;
      }

      .loading {
        text-align: center;
        padding: 40px;
        font-size: 18px;
        color: white;
      }

      .error {
        background: #dc3545;
        color: white;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
      }

      .recent-searches {
        display: flex;
        gap: 10px;
        margin-top: 10px;
        flex-wrap: wrap;
      }

      .recent-city {
        padding: 5px 15px;
        background: #e9ecef;
        border-radius: 20px;
        cursor: pointer;
        font-size: 14px;
      }

      .recent-city:hover {
        background: #dee2e6;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 style="color: white; text-align: center; margin-bottom: 30px">
        Weather Dashboard
      </h1>

      <div class="search-box">
        <input
          type="text"
          id="cityInput"
          placeholder="Enter city name..."
          onkeypress="if (event.key === 'Enter') searchWeather();"
        />
        <button onclick="searchWeather()">Search</button>
        <div class="recent-searches" id="recentSearches"></div>
      </div>

      <div class="loading" id="loadingMessage">Loading...</div>
      <div class="error" id="errorMessage"></div>
      <div class="weather-card" id="weatherDisplay"></div>
      <div class="forecast-grid" id="forecastDisplay"></div>
    </div>

    <script>
      const API_KEY = ""; // Get from openweathermap.org
      const loadingMessage = document.getElementById("loadingMessage");
      const errorMessage = document.getElementById("errorMessage");
      const weatherDisplay = document.getElementById("weatherDisplay");
      const forecastDisplay = document.getElementById("forecastDisplay");
      const recentSearchesContainer = document.getElementById("recentSearches");

      // TODO: Implement functions

      async function fetchWeather(city) {
        // TODO: Fetch current weather from API
        const response = await fetch(
          `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`,
        );
        if (!response.ok) throw new Error("Failed to fetch city weather!");
        const data = await response.json();

        return data;
      }

      async function fetchForecast(city) {
        // TODO: Fetch 5-day forecast from API
        const response = await fetch(
          `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${API_KEY}&units=metric`,
        );
        if (!response.ok) throw new Error("Failed to fetch city weather!");
        const data = await response.json();

        return data;
      }

      function displayWeather(data) {
        // TODO: Display current weather
        // data.main.temp, data.weather[0].description
        // data.main.humidity, data.wind.speed

        const {name, main, weather, wind} = data;
        const icon = getWeatherEmoji(weather[0].main);
        // console.log(data)

        weatherDisplay.innerHTML = `
          <div class="weather-card-left">
            <h2>${icon} ${name}</h2>
            <p class="temp-display">${main.temp.toFixed(0)}°C</p>
          </div>
          <div class="weather-card-right">
            <p class="weather-info"><b>Condition:</b> ${weather[0].description}</p>
            <p class="weather-info"><b>Humidity:</b> ${main.humidity}%</p>
            <p class="weather-info"><b>Wind Speed:</b> ${wind.speed} m/s</p>
          <div>
        `;
      }

      function displayForecast(data) {
        // TODO: Display forecast (filter for one per day)
        forecastDisplay.innerHTML = "";
        
        for (let i = 0; i < data.cnt; i+= 8) {
          const forecast = data.list[i];
          const forecastItem = document.createElement("div");
          const date = new Date(forecast.dt_txt.split(" ")[0]);
          forecastItem.className = "forecast-item";
          console.log(forecast)
          forecastItem.innerHTML = `
            <p><b>${date.toLocaleDateString()}</b></p>
            <p>${getWeatherEmoji(forecast.weather[0].main)}</p>
            <p><b>${forecast.main.temp.toFixed(0)}°C</b></p>
            <p><b>${forecast.weather[0].main}</b></p>
          `;
          forecastDisplay.appendChild(forecastItem);
        }
      }

      async function searchWeather() {
        // TODO: Get city input and fetch weather
        const city = document.getElementById("cityInput").value.trim();

        if (!city) {
          showError("Please enter a city name!");
          return;
        }
        clearError();

        // TODO: Handle loading state
        weatherDisplay.innerHTML = "";
        forecastDisplay.innerHTML = "";
        showLoading();
        
        try {
          const weatherData = await fetchWeather(city);  
          const forecastData = await fetchForecast(city);
          
          displayWeather(weatherData);
          displayForecast(forecastData);
          hideLoading();

          // TODO: Save to recent searches
          saveRecentSearch(city);
          loadRecentSearches();
          
        } catch (err) {
          // TODO: Handle errors
          showError(err.message);
          hideLoading();
          weatherDisplay.innerHTML = "";
          forecastDisplay.innerHTML = "";
        }
      }

      function saveRecentSearch(city) {
        // TODO: Save to localStorage (max 5 cities)
        let searches = JSON.parse(localStorage.getItem("recentSearches")) || [];
        if (!searches.includes(city)) {
          if (searches.unshift(city) > 5) searches.pop();
          localStorage.setItem("recentSearches", JSON.stringify(searches));
        }
      }

      function loadRecentSearches() {
        // TODO: Load and display recent searches
        const searches = JSON.parse(localStorage.getItem("recentSearches")) || [];
        recentSearchesContainer.innerHTML = "";
        
        searches.forEach(city => {
          const button = document.createElement("button");
          button.textContent = city;
          button.className = "recent-city";
          button.onclick = () => {
            document.getElementById("cityInput").value = city;
            searchWeather();
          }
          recentSearchesContainer.appendChild(button);
        });
      }

      function showError(message) {
        // TODO: Display error message
        const errorMessage = document.getElementById("errorMessage");
        errorMessage.textContent = message;
        errorMessage.style.display = "block";
      }

      function clearError() {
        // TODO: Clear error message
        const errorMessage = document.getElementById("errorMessage");
        errorMessage.textContent = "";
        errorMessage.style.display = "none";
      }

      function showLoading() {
        loadingMessage.style.display = "block";
      }

      function hideLoading() {
        loadingMessage.style.display = "none";
      }

      function getWeatherEmoji(condition) {
        const map = {
          Clear: "☀️",
          Clouds: "☁️",
          Rain: "🌧️",
          Drizzle: "🌦️",
          Thunderstorm: "⛈️",
          Snow: "❄️",
          Mist: "🌫️",
          Fog: "🌁",
          Smoke: "💨",
        };
        return map[condition] || "🌍";
      }

      // Initialize
      loadRecentSearches();
      clearError();
      hideLoading();
    </script>
  </body>
</html>
